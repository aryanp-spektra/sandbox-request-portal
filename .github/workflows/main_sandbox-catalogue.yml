# Build the Next.js app into a self-contained standalone server and deploy it
# to Azure App Service (Linux). The app runs with `node server.js`, no Next CLI
# or toolchain is needed on the host.
#
# One-time Azure setup (Portal > Configuration > General settings):
#   Startup Command:  node server.js
# Recommended app settings (Portal > Configuration > Application settings):
#   SCM_DO_BUILD_DURING_DEPLOYMENT = false   (we ship a prebuilt artifact)
#   WEBSITES_PORT                  = 8080     (optional; standalone reads PORT)

name: Build and deploy Next.js app to Azure Web App - sandbox-catalogue

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Assemble standalone deployment package
        run: |
          mkdir deploy
          cp -r .next/standalone/. deploy/
          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static
          if [ -d public ]; then cp -r public deploy/public; fi
          # Make `npm start` launch the standalone server (belt-and-suspenders
          # alongside the Azure Startup Command).
          node -e "const fs=require('fs');const f='deploy/package.json';const p=JSON.parse(fs.readFileSync(f));p.scripts={...(p.scripts||{}),start:'node server.js'};fs.writeFileSync(f,JSON.stringify(p,null,2));"

      - name: Zip artifact (preserves structure, no lost symlinks)
        run: cd deploy && zip -qr ../release.zip . && cd ..

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip package
        run: unzip -q release.zip -d release

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sandbox-catalogue'
          slot-name: 'Production'
          package: release
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_9D2EF8C8B2C1416FAE59E08924745C6D }}
